<div class="shell">
  <header class="shell__header">
    <div class="shell__title">
      <h1>{{ appName }}</h1>
      <p>Frontend shell ({{ environmentName }})</p>
    </div>
    <nav class="shell__nav">
      <a *ngIf="isModuleVisible('dashboard')" routerLink="/dashboard" routerLinkActive="active">
        Dashboard
      </a>
      <a *ngIf="isModuleVisible('dossiers')" routerLink="/dossiers" routerLinkActive="active">
        Dossiers
      </a>
      <a *ngIf="isModuleVisible('watchlist')" routerLink="/watchlist" routerLinkActive="active">
        Watchlist
      </a>
    </nav>
  </header>

  <main class="shell__content">
    <router-outlet />
  </main>
</div>
