name: verify-ci-release-gate

on:
  push:
    branches:
      - main
      - ticket/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-ci:
    name: verify-ci-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.5.27'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install backend dependencies
        run: uv sync --directory services/api --frozen

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Run verify-ci contract
        run: make verify-ci

  api-e2e:
    name: api-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.5.27'

      - name: Install backend dependencies
        run: uv sync --directory services/api --frozen

      - name: Run API e2e gate
        run: make verify-api-e2e

  ui-e2e:
    name: ui-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Playwright browser runtime
        run: pnpm --dir frontend dlx @playwright/test@1.52.0 install --with-deps chromium

      - name: Run UI e2e gate
        run: make verify-ui-e2e PLAYWRIGHT_SKIP_INSTALL=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  security-semgrep:
    name: security-semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/owasp-top-ten
            p/python
            p/typescript

  security-trivy:
    name: security-trivy-fs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (vuln+misconfig+secret)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan to security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  security-codeql:
    name: security-codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    needs:
      - verify-ci
      - api-e2e
      - ui-e2e
      - security-semgrep
      - security-trivy
      - security-codeql
    steps:
      - name: Release gate passed
        run: |
          echo "All required CI gates are green."
          echo "High-risk tickets must keep this gate green before closure."
